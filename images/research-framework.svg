<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a78d6"/>
      <stop offset="100%" stop-color="#008300"/>
    </linearGradient>
  </defs>

  <!-- connector lines (drawn first, boxes/circle sit on top of the ends) -->
  <g stroke="#c3c2b7" stroke-width="2">
    <line x1="145" y1="90" x2="450" y2="230"/>
    <line x1="755" y1="90" x2="450" y2="230"/>
    <line x1="145" y1="370" x2="450" y2="230"/>
    <line x1="755" y1="370" x2="450" y2="230"/>
  </g>

  <!-- center node -->
  <circle cx="450" cy="230" r="70" fill="url(#centerGrad)"/>
  <text x="450" y="222" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700">Geospatial</text>
  <text x="450" y="246" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700">AI</text>

  <!-- top-left: Hydrologic Modeling -->
  <rect x="30" y="20" width="230" height="100" rx="14" fill="#fcfcfb" stroke="#2a78d6" stroke-width="2"/>
  <text x="145" y="55" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">Hydrologic Modeling</text>
  <text x="145" y="78" text-anchor="middle" font-size="12.5" fill="#52514e">MODFLOW &#183; Groundwater&#8211;</text>
  <text x="145" y="95" text-anchor="middle" font-size="12.5" fill="#52514e">Surface Water Simulation</text>

  <!-- top-right: Physics-Guided ML -->
  <rect x="640" y="20" width="230" height="100" rx="14" fill="#fcfcfb" stroke="#008300" stroke-width="2"/>
  <text x="755" y="55" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">Physics-Guided ML</text>
  <text x="755" y="78" text-anchor="middle" font-size="12.5" fill="#52514e">Theory-Guided Neural Nets</text>
  <text x="755" y="95" text-anchor="middle" font-size="12.5" fill="#52514e">&#183; PINNs &#183; Surrogate Models</text>

  <!-- bottom-left: Remote Sensing & DEM -->
  <rect x="30" y="340" width="230" height="100" rx="14" fill="#fcfcfb" stroke="#008300" stroke-width="2"/>
  <text x="145" y="375" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">Remote Sensing &amp; DEM</text>
  <text x="145" y="398" text-anchor="middle" font-size="12.5" fill="#52514e">LiDAR &#183; Elevation-Derived</text>
  <text x="145" y="415" text-anchor="middle" font-size="12.5" fill="#52514e">Hydrography</text>

  <!-- bottom-right: Decision-Support -->
  <rect x="640" y="340" width="230" height="100" rx="14" fill="#fcfcfb" stroke="#2a78d6" stroke-width="2"/>
  <text x="755" y="375" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">Decision-Support</text>
  <text x="755" y="398" text-anchor="middle" font-size="12.5" fill="#52514e">GeoAI for Environmental</text>
  <text x="755" y="415" text-anchor="middle" font-size="12.5" fill="#52514e">Sustainability</text>
</svg>
